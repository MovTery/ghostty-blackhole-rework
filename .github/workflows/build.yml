name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 (UCRT64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils

      - name: Create build dir & embedded shader header
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build
          $enc = [System.Text.Encoding]::UTF8
          $vertSrc       = [System.IO.File]::ReadAllText("shaders/vert.glsl", $enc)
          $fragHeaderSrc = [System.IO.File]::ReadAllText("shaders/frag_desktop_header.glsl", $enc)
          $blackholeSrc  = [System.IO.File]::ReadAllText("blackhole.glsl", $enc)
          $sb = [System.Text.StringBuilder]::new()
          [void]$sb.AppendLine("// Auto-generated by build script - DO NOT EDIT")
          [void]$sb.AppendLine("#pragma once")
          [void]$sb.AppendLine("")
          [void]$sb.Append('inline const char* g_vert_src = R"EMBED_BH(')
          [void]$sb.Append("`n")
          [void]$sb.Append($vertSrc)
          [void]$sb.Append("`n")
          [void]$sb.AppendLine(')EMBED_BH";')
          [void]$sb.AppendLine("")
          [void]$sb.Append('inline const char* g_frag_header_src = R"EMBED_BH(')
          [void]$sb.Append("`n")
          [void]$sb.Append($fragHeaderSrc)
          [void]$sb.Append("`n")
          [void]$sb.AppendLine(')EMBED_BH";')
          [void]$sb.AppendLine("")
          [void]$sb.Append('inline const char* g_blackhole_src = R"EMBED_BH(')
          [void]$sb.Append("`n")
          [void]$sb.Append($blackholeSrc)
          [void]$sb.Append("`n")
          [void]$sb.AppendLine(')EMBED_BH";')
          [System.IO.File]::WriteAllText("build/embedded_shaders.h", $sb.ToString(), $enc)
          Write-Host "  -> build/embedded_shaders.h"

      - name: Compile (MSYS2 UCRT64)
        shell: msys2 {0}
        run: |
          set -e
          echo "=== windres ==="
          windres --output-format=coff --input-format=rc -o build/resource.o resource.rc
          echo "=== g++ ==="
          g++ -std=c++17 -O2 -static \
            -o build/blackhole.exe \
            src/main.cpp \
            src/capture_wgc.cpp \
            src/capture_dxgi.cpp \
            src/gl_texture.cpp \
            src/gui_config.cpp \
            src/win32_gl.cpp \
            src/imgui/imgui.cpp \
            src/imgui/imgui_draw.cpp \
            src/imgui/imgui_widgets.cpp \
            src/imgui/imgui_tables.cpp \
            src/imgui/imgui_impl_glfw.cpp \
            src/imgui/imgui_impl_opengl3.cpp \
            build/resource.o \
            -I build \
            -I src/imgui \
            -I third_party/include \
            -I /ucrt64/include \
            -L third_party/lib-mingw-w64 \
            -L /ucrt64/lib \
            -lglfw3 -lopengl32 -lgdi32 -ld3d11 -ldxgi \
            -lruntimeobject -ldwmapi -lcomctl32 -lole32 \
            -mwindows
          echo "=== cleanup ==="
          rm -f build/resource.o build/embedded_shaders.h

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blackhole
          path: build/blackhole.exe
